<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>guason</title>
  <link rel="stylesheet" href="./styles.css?v=7"/>
</head>
<body class="tv-page">

  <audio id="tvNoise" preload="auto">
    <source src="./assets/white-noise.mp3?v=2" type="audio/mpeg">
  </audio>

  <div id="tvScreen" class="tv-screen">
    <div class="tv-static-layer tv-static-a"></div>
    <div class="tv-static-layer tv-static-b"></div>
    <div class="tv-lines"></div>
  </div>

  <script>
    const screen = document.getElementById("tvScreen");
    const audio = document.getElementById("tvNoise");
    let triggered = false;

    function goNext() {
      if (triggered) return;
      triggered = true;

      audio.volume = 0.22;

      audio.play().catch(() => {});

      setTimeout(() => {
        window.location.href = "./rec.html";
      }, 700);
    }

    screen.addEventListener("click", goNext, { once: true });
    screen.addEventListener("touchstart", goNext, { once: true });
  </script>

</body>
</html>
