<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>guason</title>
  <link rel="stylesheet" href="./styles.css"/>
</head>
<body class="signal-page">

  <audio id="noise" loop preload="auto">
    <source src="./assets/white-noise.mp3" type="audio/mpeg">
  </audio>

  <a href="./rec.html" class="signal-screen" aria-label="continuar">
    <div class="tv-noise tv-noise-1"></div>
    <div class="tv-noise tv-noise-2"></div>
    <div class="tv-scanlines"></div>
  </a>

  <script>
    const audio = document.getElementById("noise");
    let started = false;

    function startNoise() {
      if (started) return;
      started = true;
      audio.volume = 0.16;
      audio.play().catch(() => {
        started = false;
      });
    }

    document.addEventListener("click", startNoise, { once: true });
    document.addEventListener("touchstart", startNoise, { once: true });
  </script>

</body>
</html>
