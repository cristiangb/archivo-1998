<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>guason</title>
  <link rel="stylesheet" href="./styles.css?v=10">
</head>
<body class="noise-page">

  <div id="noiseScreen" class="noise-screen">
    <img src="./assets/white.gif" class="noise-gif" alt="noise">
  </div>

  <audio id="noiseAudio" preload="auto">
    <source src="./assets/white-noise.mp3" type="audio/mpeg">
  </audio>

  <script>
    const screen = document.getElementById("noiseScreen");
    const audio = document.getElementById("noiseAudio");
    let triggered = false;

    function goNext() {
      if (triggered) return;
      triggered = true;

      audio.volume = 0.22;

      audio.play().catch(() => {});

      setTimeout(() => {
        window.location.href = "./rec.html";
      }, 900);
    }

    screen.addEventListener("click", goNext, { once: true });
    screen.addEventListener("touchstart", goNext, { once: true });
  </script>

</body>
</html>
