<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>rec</title>
  <link rel="stylesheet" href="./styles.css"/>
</head>

<body class="audio-page rec-page">

  <div class="wrap">
    <main class="card">

      <div class="header">
        <h1>ARCHIVO // 1998</h1>
        <div class="badge rec-badge">REC <span class="rec-dot"></span></div>
      </div>

      <img id="recVisual" class="hero rec" src="./assets/rec.gif" alt=""/>

      <div class="hr"></div>

      <div class="rec-timer-wrap">
        <div id="recTimer" class="rec-timer">00:00:00</div>
      </div>

      <div class="hr"></div>

      <p class="small">La cámara siempre llega tarde, pero deja prueba.</p>

      <div class="footer">
        <span><code>/game/&lt;palabra&gt;.html</code></span>
        <span class="small">tap para reiniciar</span>
      </div>

    </main>
  </div>

  <script>
    const visual = document.getElementById("recVisual");
    const timerEl = document.getElementById("recTimer");

    const gifSrc = "./assets/rec.gif";
    const lastFrameSrc = "./assets/rec-last.jpg";

    // 2.07 segundos
    const totalDurationMs = 2070;

    let animationFrameId = null;
    let freezeTimeout = null;
    let startTime = null;
    let running = false;

    function pad2(n) {
      return String(n).padStart(2, "0");
    }

    function formatTime(totalCentiseconds) {
      const minutes = Math.floor(totalCentiseconds / 6000);
      const seconds = Math.floor((totalCentiseconds % 6000) / 100);
      const centiseconds = totalCentiseconds % 100;
      return `${pad2(minutes)}:${pad2(seconds)}:${pad2(centiseconds)}`;
    }

    function stopPlayback() {
      running = false;

      if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
      }

      if (freezeTimeout) {
        clearTimeout(freezeTimeout);
        freezeTimeout = null;
      }
    }

    function updateTimer(now) {
      if (!running) return;

      const elapsedMs = now - startTime;
      const elapsedCentiseconds = Math.min(Math.round(elapsedMs / 10), 270);

      timerEl.textContent = formatTime(elapsedCentiseconds);

      if (elapsedCentiseconds < 270) {
        animationFrameId = requestAnimationFrame(updateTimer);
      }
    }

    function freezeAtEnd() {
      stopPlayback();
      timerEl.textContent = "00:02:70";
      visual.src = lastFrameSrc;
    }

    function restartRec() {
      stopPlayback();

      timerEl.textContent = "00:00:00";

      // Fuerza recarga del GIF desde el inicio
      visual.src = gifSrc + "?t=" + Date.now();

      running = true;
      startTime = performance.now();
      animationFrameId = requestAnimationFrame(updateTimer);

      freezeTimeout = setTimeout(freezeAtEnd, totalDurationMs);
    }

    // arranca al cargar
    window.addEventListener("load", restartRec);

    // tap/click en cualquier lugar reinicia todo
    document.addEventListener("click", restartRec);
    document.addEventListener("touchstart", restartRec);
  </script>

</body>

</html>
